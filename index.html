<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Salitan — Pickleball Open Play</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#10150f">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#10150f; --card:#1b231a; --card2:#242f22; --line:#33402f;
    --ink:#eef3ea; --dim:#93a08c; --accent:#c3f53c; --accent-ink:#1a2404;
    --teamA:#5fd4f5; --teamB:#ffb85c; --danger:#ff7a6e; --win:#8de08a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{background:var(--bg); color:var(--ink); font-family:-apple-system,'Segoe UI',Roboto,sans-serif; padding-bottom:80px;}
  h1,h2,h3{margin:0;}
  button{font-family:inherit; border:none; border-radius:10px; cursor:pointer; font-size:15px;}
  input{font-family:inherit; font-size:16px; background:var(--card2); border:1px solid var(--line); color:var(--ink); border-radius:10px; padding:10px 12px; outline:none;}
  input:focus{border-color:var(--accent);}
  .wrap{max-width:560px; margin:0 auto; padding:14px;}
  header.top{display:flex; align-items:center; justify-content:space-between; padding:14px 14px 4px; max-width:560px; margin:0 auto;}
  header.top h1{font-size:20px; letter-spacing:.3px;}
  header.top h1 span{color:var(--accent);}
  .subtle{color:var(--dim); font-size:13px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px;}
  .btn{background:var(--card2); color:var(--ink); padding:10px 14px;}
  .btn.primary{background:var(--accent); color:var(--accent-ink); font-weight:700;}
  .btn.ghost{background:transparent; color:var(--dim); border:1px solid var(--line);}
  .btn.danger{background:transparent; color:var(--danger); border:1px solid var(--line);}
  .btn.small{padding:6px 10px; font-size:13px; border-radius:8px;}
  .row{display:flex; gap:8px; align-items:center;}
  .row .grow{flex:1;}
  /* tabs */
  nav.tabs{position:fixed; bottom:0; left:0; right:0; background:#151b14; border-top:1px solid var(--line); display:flex; z-index:20;}
  nav.tabs button{flex:1; background:none; color:var(--dim); padding:12px 0 max(12px, env(safe-area-inset-bottom)); font-size:13px; border-radius:0;}
  nav.tabs button.on{color:var(--accent); font-weight:700;}
  /* court */
  .court{border:1px solid var(--line); border-radius:14px; margin-bottom:12px; overflow:hidden;}
  .court .head{display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:var(--card2); font-size:13px; color:var(--dim);}
  .court .head b{color:var(--ink); font-size:15px;}
  .court .body{padding:12px 14px; background:var(--card);}
  .badge{font-size:11px; padding:3px 8px; border-radius:99px; background:var(--card); border:1px solid var(--line);}
  .badge.play{color:var(--accent); border-color:var(--accent);}
  .badge.stage{color:var(--teamB); border-color:var(--teamB);}
  .teams{display:flex; align-items:stretch; gap:8px;}
  .team{flex:1; border-radius:12px; padding:8px; display:flex; flex-direction:column; gap:8px;}
  .team.a{background:rgba(95,212,245,.08); border:1px solid rgba(95,212,245,.35);}
  .team.b{background:rgba(255,184,92,.08); border:1px solid rgba(255,184,92,.35);}
  .team .tname{font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--dim); text-align:center;}
  .vs{align-self:center; color:var(--dim); font-size:12px; font-weight:700;}
  .chip{background:var(--card2); border:1px solid var(--line); border-radius:10px; padding:10px 10px; text-align:center; font-size:15px; font-weight:600; user-select:none; touch-action:none; position:relative;}
  .chip small{display:block; font-weight:400; color:var(--dim); font-size:11px; margin-top:1px;}
  .chip.sel{outline:2px solid var(--accent); outline-offset:1px;}
  .chip.drophint{outline:2px dashed var(--accent); outline-offset:1px;}
  .chip.vacant{border-style:dashed; background:transparent; color:var(--dim); font-weight:400; cursor:pointer;}
  .dropzone{outline:2px dashed var(--accent); outline-offset:2px; border-radius:14px;}
  .dragghost{position:fixed; z-index:99; pointer-events:none; opacity:.92; width:150px; background:var(--card2); border:1px solid var(--accent); border-radius:10px; padding:10px; text-align:center; font-weight:600; box-shadow:0 8px 24px rgba(0,0,0,.5);}
  .court .actions{display:flex; gap:8px; margin-top:12px;}
  .court .actions .btn{flex:1;}
  .empty-court{color:var(--dim); font-size:14px; text-align:center; padding:8px 0;}
  .timer{font-variant-numeric:tabular-nums; color:var(--accent); font-weight:700;}
  /* queue */
  .qitem{display:flex; align-items:center; gap:10px; padding:10px; background:var(--card2); border:1px solid var(--line); border-radius:10px; margin-bottom:8px;}
  .qitem:last-child{margin-bottom:0;}
  .qpos{width:24px; height:24px; border-radius:50%; background:var(--card2); color:var(--dim); font-size:12px; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0;}
  .qitem.next .qpos{background:var(--accent); color:var(--accent-ink);}
  .qname{flex:1; font-weight:600;}
  .qname[data-chip]{touch-action:none; cursor:grab; user-select:none; -webkit-user-select:none;}
  .qgrab{color:var(--dim); margin-right:2px;}
  .qname .meta{font-weight:400; color:var(--dim); font-size:12px;}
  .tag{font-size:11px; padding:2px 7px; border-radius:99px; border:1px solid var(--line); color:var(--dim);}
  .tag.w{color:var(--win); border-color:var(--win);}
  .tag.zz{color:var(--teamB); border-color:var(--teamB);}
  .hint{color:var(--dim); font-size:12.5px; line-height:1.5; margin-top:10px;}
  /* players table */
  table{width:100%; border-collapse:collapse; font-size:14px;}
  th{color:var(--dim); font-weight:600; font-size:12px; text-align:left; padding:6px 4px; border-bottom:1px solid var(--line);}
  td{padding:8px 4px; border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  .st{font-size:11px; padding:2px 7px; border-radius:99px; border:1px solid var(--line); color:var(--dim); white-space:nowrap;}
  .st.playing{color:var(--accent); border-color:var(--accent);}
  .st.break{color:var(--teamB); border-color:var(--teamB);}
  /* log */
  .match{padding:10px 4px; border-bottom:1px solid var(--line); font-size:14px; line-height:1.5;}
  .match:last-child{border-bottom:none;}
  .match .who{font-weight:600;}
  .match .score{color:var(--accent); font-weight:700;}
  .match .meta{color:var(--dim); font-size:12px;}
  /* setup */
  .plist{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
  .ptag{background:var(--card2); border:1px solid var(--line); border-radius:99px; padding:7px 12px; font-size:14px; display:flex; gap:8px; align-items:center;}
  .ptag b{font-weight:600;}
  .ptag .x{color:var(--danger); font-weight:700; cursor:pointer; padding:0 2px;}
  label.lbl{display:block; color:var(--dim); font-size:13px; margin:14px 0 6px;}
  /* modal */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.65); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;}
  .modal{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; width:100%; max-width:420px;}
  .modal h3{margin-bottom:4px;}
  .scorerow{display:flex; gap:10px; align-items:center; margin:14px 0;}
  .scorerow input{width:100%; text-align:center; font-size:20px; font-weight:700;}
  .winbtns{display:flex; gap:10px;}
  .winbtns .btn{flex:1; padding:14px 8px; font-weight:700;}
  .winbtns .wa{background:rgba(95,212,245,.15); color:var(--teamA); border:1px solid var(--teamA);}
  .winbtns .wb{background:rgba(255,184,92,.15); color:var(--teamB); border:1px solid var(--teamB);}
  .toast{position:fixed; bottom:76px; left:50%; transform:translateX(-50%); background:var(--card2); border:1px solid var(--line); color:var(--ink); padding:10px 16px; border-radius:99px; font-size:13.5px; z-index:60; box-shadow:0 6px 20px rgba(0,0,0,.4); white-space:nowrap;}
  .hidden{display:none !important;}
  /* motion */
  @keyframes fade{from{opacity:0}}
  @keyframes pop{from{opacity:0; transform:scale(.92) translateY(10px)}}
  @keyframes toastup{from{opacity:0; transform:translate(-50%,12px)}}
  @keyframes winpulse{0%{box-shadow:0 0 0 0 rgba(141,224,138,.6)}100%{box-shadow:0 0 0 16px rgba(141,224,138,0)}}
  .overlay{animation:fade .18s ease}
  .modal{animation:pop .22s cubic-bezier(.2,.8,.2,1)}
  .toast{animation:toastup .25s cubic-bezier(.2,.8,.2,1)}
  .team.winflash{border-color:var(--win); animation:winpulse .5s ease}
  .team.winflash .chip{border-color:var(--win)}
  /* finish session */
  .holdbtn{position:relative; overflow:hidden; width:100%; padding:14px; background:var(--card2); color:var(--danger); border:1px solid var(--danger); border-radius:12px; font-weight:700; touch-action:none; user-select:none;}
  .holdbtn .fill{position:absolute; inset:0; width:0; background:rgba(255,122,110,.28); transition:width .15s;}
  .holdbtn.arming .fill{width:100%; transition:width 1.2s linear;}
  .holdbtn .txt{position:relative;}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important} }
</style>
</head>
<body>
<header class="top">
  <h1>🥒 Sali<span>tan</span></h1>
  <button class="btn ghost small" data-action="new-session" id="btnNewSession">New session</button>
</header>
<div class="wrap" id="app"></div>
<nav class="tabs hidden" id="tabs">
  <button data-action="tab" data-tab="play" class="on">Courts</button>
  <button data-action="tab" data-tab="players">Players</button>
  <button data-action="tab" data-tab="log">Log</button>
</nav>
<div id="modalHost"></div>
<div id="toastHost"></div>

<script>
/* ============================================================
   ENGINE — pure game/queue logic (no DOM)
   ============================================================ */
const LS_KEY = 'pickle-queue-v1';

let state = null;

function freshState(names, courtCount){
  const s = {
    screen:'main', startedAt:Date.now(), rev:0, tick:0, matchSeq:0,
    players:[], courts:[], matches:[], undoStack:[]
  };
  names.forEach(n => s.players.push(mkPlayer(s, n, 0)));
  for(let i=1;i<=courtCount;i++) s.courts.push(mkCourt(i));
  return s;
}
function mkPlayer(s, name, base){
  return { id:'p'+(++s.tick)+'_'+Math.random().toString(36).slice(2,6),
    name, games:0, base:(base||0), wins:0, losses:0, wonLast:false, partnerId:null,
    status:'queued', queuedAt:(++s.tick), history:[] };
}
function mkCourt(i){ return { id:i, phase:'idle', teams:null, startedAt:null }; }

function byId(id){ return state.players.find(p=>p.id===id); }
function nameOf(id){ const p=byId(id); return p?p.name:'?'; }
function effGames(p){ return p.games + p.base; }
function courtPlayers(c){ return c.teams ? [...c.teams[0], ...c.teams[1]].filter(Boolean) : []; }

/* Priority: manual pins first (by pinned order), then fewest (effective) games →
   recent winners → waited longest. Pins are set by drag-reordering the queue and
   clear automatically when a player goes on court, so fairness resumes. */
function prioritySort(list){
  return list.slice().sort((a,b)=>{
    const ap = a.pin!=null, bp = b.pin!=null;
    if(ap && bp) return a.pin-b.pin;
    if(ap!==bp) return ap ? -1 : 1;
    return effGames(a)-effGames(b) ||
      ((b.wonLast?1:0)-(a.wonLast?1:0)) ||
      a.queuedAt-b.queuedAt;
  });
}
function reorderQueue(movePid, targetPid){
  const ids = prioritySort(queuedPlayers()).map(p=>p.id);
  const from = ids.indexOf(movePid), to = ids.indexOf(targetPid);
  if(from<0 || to<0 || from===to) return false;
  ids.splice(from,1); ids.splice(to,0,movePid);
  ids.forEach((id,i)=>{ const p=byId(id); if(p) p.pin=i; });
  return true;
}
function queuedPlayers(){ return state.players.filter(p=>p.status==='queued'); }

function randomTeams(ids){
  const a=ids.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return [[a[0],a[1]],[a[2],a[3]]];
}

function shuffleArr(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function setPartner(aId, bId){
  const A = byId(aId); if(!A) return;
  if(A.partnerId){ const old = byId(A.partnerId); if(old) old.partnerId = null; A.partnerId = null; }
  if(bId){
    const B = byId(bId); if(!B) return;
    if(B.partnerId){ const old = byId(B.partnerId); if(old) old.partnerId = null; }
    A.partnerId = B.id; B.partnerId = A.id;
  }
}

/* Pick next 4 respecting fixed pairs: a paired player only goes on if their
   partner fits too; if that leaves the court short, pairs win over the last single.
   Only breaks a pair as a last resort so courts never idle with 4+ waiting. */
function pickFour(){
  const q = prioritySort(queuedPlayers());
  if(q.length<4) return null;
  const chosen = [];
  const inChosen = id => chosen.some(p=>p.id===id);
  for(const p of q){
    if(chosen.length>=4) break;
    if(inChosen(p.id)) continue;
    const mate = p.partnerId ? q.find(x=>x.id===p.partnerId && !inChosen(x.id)) : null;
    if(mate){ if(chosen.length<=2) chosen.push(p, mate); }
    else chosen.push(p);
  }
  if(chosen.length===3){
    for(const p of q){
      if(inChosen(p.id) || !p.partnerId) continue;
      const mate = q.find(x=>x.id===p.partnerId && !inChosen(x.id));
      if(mate){ chosen.pop(); chosen.push(p, mate); break; }
    }
  }
  if(chosen.length===4) return chosen;
  return q.slice(0,4); // last resort: break a pair rather than stall the court
}

/* Split 4 into teams, keeping fixed pairs on the same side */
function teamsFor(ids){
  const ps = ids.map(byId), used = new Set(), pairs = [], singles = [];
  for(const p of ps){
    if(!p || used.has(p.id)) continue;
    const mate = ps.find(x=>x && x.id===p.partnerId);
    if(mate && !used.has(mate.id)){ pairs.push([p.id, mate.id]); used.add(p.id); used.add(mate.id); }
  }
  for(const p of ps) if(p && !used.has(p.id)) singles.push(p.id);
  if(pairs.length===2) return shuffleArr(pairs);
  if(pairs.length===1){ const s = shuffleArr(singles); return shuffleArr([pairs[0], [s[0], s[1]]]); }
  return randomTeams(ids);
}

/* Fill any idle court with the top 4 of the priority queue */
function fillCourts(){
  for(const c of state.courts){
    if(c.phase!=='idle') continue;
    const four = pickFour();
    if(!four) continue;
    four.forEach(p=>{ p.status='playing'; p.pin=null; });
    c.teams = teamsFor(four.map(p=>p.id));
    c.phase = 'staging';
    c.startedAt = null;
  }
}

function shuffleTeams(courtId){
  const c = state.courts.find(x=>x.id===courtId);
  if(c && c.teams && courtPlayers(c).length===4) c.teams = teamsFor(courtPlayers(c));
}

function startMatch(courtId){
  const c = state.courts.find(x=>x.id===courtId);
  if(!c || c.phase!=='staging' || courtPlayers(c).length<4) return false;
  c.phase='playing'; c.startedAt=Date.now(); return true;
}

/* Find where a player currently sits on any court: {court, ti, pi} or null */
function findSlot(pid){
  for(const c of state.courts){
    if(!c.teams) continue;
    for(let ti=0;ti<2;ti++){
      const pi = c.teams[ti].indexOf(pid);
      if(pi>-1) return {court:c, ti, pi};
    }
  }
  return null;
}

/* Swap any two players: court↔court (incl. same court = team swap) or court↔queue (substitution) */
function swapPlayers(aId, bId){
  if(aId===bId) return false;
  const A=byId(aId), B=byId(bId);
  if(!A||!B) return false;
  const sa=findSlot(aId), sb=findSlot(bId);
  if(sa && sb){
    sa.court.teams[sa.ti][sa.pi]=bId;
    sb.court.teams[sb.ti][sb.pi]=aId;
    return true;
  }
  if(sa && !sb){ return subIn(sa, A, B); }
  if(sb && !sa){ return subIn(sb, B, A); }
  return false; // both in queue — nothing to swap
}
function subIn(slot, onCourt, fromQueue){
  if(fromQueue.status!=='queued') return false;
  slot.court.teams[slot.ti][slot.pi] = fromQueue.id;
  fromQueue.status='playing'; fromQueue.pin=null;
  onCourt.status='queued'; onCourt.queuedAt=(++state.tick); onCourt.pin=null;
  return true;
}

/* Bench a court player without a replacement — their slot stays open */
function removeFromCourt(pid){
  const slot = findSlot(pid); if(!slot) return false;
  const p = byId(pid); if(!p) return false;
  slot.court.teams[slot.ti][slot.pi] = '';
  p.status='queued'; p.queuedAt=(++state.tick); p.pin=null;
  const c = slot.court;
  if(courtPlayers(c).length===0){ c.phase='idle'; c.teams=null; c.startedAt=null; fillCourts(); }
  return true;
}
/* Put a player (from queue or another slot) into a specific open slot */
function placeVacant(pid, courtId, ti, pi){
  const c = state.courts.find(x=>x.id===courtId);
  if(!c || !c.teams || c.teams[ti][pi]) return false;
  const p = byId(pid); if(!p) return false;
  const slot = findSlot(pid);
  if(slot){ slot.court.teams[slot.ti][slot.pi] = ''; }
  else if(p.status!=='queued') return false;
  c.teams[ti][pi] = pid;
  p.status='playing'; p.pin=null;
  return true;
}

function pushUndo(){
  state.undoStack.push(JSON.stringify({...state, undoStack:[]}));
  if(state.undoStack.length>10) state.undoStack.shift();
}
function undo(){
  const snap = state.undoStack.pop();
  if(!snap) return false;
  const keep = state.undoStack;
  state = JSON.parse(snap);
  state.undoStack = keep;
  return true;
}

function finishMatch(courtId, winnerIdx, sa, sb){
  const c = state.courts.find(x=>x.id===courtId);
  if(!c || !c.teams) return;
  pushUndo();
  const rec = { id:(++state.matchSeq), court:c.id,
    a:c.teams[0].filter(Boolean).map(nameOf), b:c.teams[1].filter(Boolean).map(nameOf),
    sa:(sa??null), sb:(sb??null), w:winnerIdx, t:Date.now() };
  state.matches.unshift(rec);
  for(let ti=0; ti<2; ti++){
    const won = (ti===winnerIdx);
    for(const pid of c.teams[ti]){
      const p = byId(pid); if(!p) continue;
      p.games++; won ? p.wins++ : p.losses++;
      p.wonLast = won;
      const mateId = c.teams[ti].find(x=>x && x!==pid);
      (p.history = p.history||[]).unshift({ m:rec.id, teammate: mateId ? nameOf(mateId) : '—', won,
        score:(sa!=null&&sb!=null) ? (ti===0? sa+'–'+sb : sb+'–'+sa) : null });
      p.status='queued'; p.queuedAt=(++state.tick); p.pin=null;
    }
  }
  c.phase='idle'; c.teams=null; c.startedAt=null;
  fillCourts();
}

function addPlayer(name){
  /* Late joiners are assumed to have already played as many games as the
     current leaders — they join the back of the rotation with no catch-up
     priority. Their real played count still shows in stats. */
  const active = state.players.filter(p=>p.status!=='out');
  const base = active.length ? Math.max(...active.map(effGames)) : 0;
  const p = mkPlayer(state, name, base);
  if(base>0) p.late = true;
  state.players.push(p);
  fillCourts();
  return p;
}

function toggleBreak(pid){
  const p = byId(pid); if(!p) return false;
  if(p.status==='playing') return false; // must sub out first
  if(p.status==='queued'){ p.status='break'; p.pin=null; }
  else if(p.status==='break'){ p.status='queued'; p.queuedAt=(++state.tick); fillCourts(); }
  return true;
}

function removePlayer(pid){
  const p = byId(pid); if(!p) return false;
  if(p.status==='playing') return false;
  if(p.partnerId) setPartner(p.id, null);
  if(p.games>0){ p.status='out'; }
  else { state.players = state.players.filter(x=>x.id!==pid); }
  return true;
}

function setCourtCount(n){
  n = Math.max(1, Math.min(12, n|0));
  const cur = state.courts.length;
  if(n>cur){ for(let i=cur+1;i<=n;i++) state.courts.push(mkCourt(i)); fillCourts(); }
  else if(n<cur){
    // remove idle courts from the end only
    for(let i=cur-1; i>=0 && state.courts.length>n; i--){
      if(state.courts[i].phase==='idle') state.courts.splice(i,1);
    }
  }
}

var IS_VIEWER = false, adopting = false;
function save(){
  if(!IS_VIEWER){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }
  if(typeof pushLive==='function' && !adopting) pushLive();
}
function sessionAsText(){
  const L=[];
  L.push('PICKLEBALL OPEN PLAY — SESSION LOG');
  L.push('Exported: '+new Date().toLocaleString());
  L.push('');
  L.push('STANDINGS');
  state.players.filter(p=>p.status!=='out' || p.games>0)
    .slice().sort((a,b)=>b.wins-a.wins || a.losses-b.losses)
    .forEach(p=>L.push(`  ${p.name}: ${p.games} games, ${p.wins}W–${p.losses}L${p.late?' (joined late)':''}${p.status==='out'?' (left early)':''}`));
  L.push('');
  L.push('MATCHES');
  state.matches.slice().reverse().forEach(m=>{
    const t=new Date(m.t), hh=t.getHours()%12||12, mm=String(t.getMinutes()).padStart(2,'0'), ap=t.getHours()<12?'am':'pm';
    const win=(m.w===0?m.a:m.b).join(' & '), lose=(m.w===0?m.b:m.a).join(' & ');
    const sc=(m.sa!=null&&m.sb!=null)?` ${m.w===0?m.sa+'–'+m.sb:m.sb+'–'+m.sa}`:'';
    L.push(`  #${m.id} Court ${m.court} ${hh}:${mm}${ap} — ${win} def. ${lose}${sc}`);
  });
  return L.join('\n');
}

const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;
function animatedRender(){
  if(REDUCED){ render(); return; }
  const old = new Map();
  document.querySelectorAll('[data-chip]').forEach(el=>old.set(el.dataset.chip, el.getBoundingClientRect()));
  render();
  requestAnimationFrame(()=>{
    document.querySelectorAll('[data-chip]').forEach(el=>{
      const prev = old.get(el.dataset.chip), now = el.getBoundingClientRect();
      if(prev){
        const dx = prev.left-now.left, dy = prev.top-now.top;
        if(Math.abs(dx)>2 || Math.abs(dy)>2)
          el.animate([{transform:`translate(${dx}px,${dy}px)`},{transform:'none'}],{duration:300,easing:'cubic-bezier(.2,.8,.2,1)'});
      } else {
        el.animate([{opacity:0, transform:'scale(.85)'},{opacity:1, transform:'none'}],{duration:220,easing:'ease-out'});
      }
    });
  });
}

function liveUrl(){ return live.dbUrl.replace(/\/$/,'')+'/sessions/'+live.id+'.json'; }
function liveLink(){ return location.origin+location.pathname+'#live='+live.id+'&db='+encodeURIComponent(live.dbUrl.replace(/\/$/,'')); }
let pushT = null;
const clientId = Math.random().toString(36).slice(2,10);
function pushLive(){
  if(!live || !live.on || !live.id || !state || state.screen==='setup') return;
  clearTimeout(pushT);
  pushT = setTimeout(()=>{
    state.rev = (state.rev||0)+1;
    const payload = {...state, undoStack:[], t:Date.now(), src:clientId,
      mode: IS_VIEWER ? (state.mode||'locked') : (live.mode||'locked')};
    fetch(liveUrl(), {method:'PUT', body: JSON.stringify(payload)}).catch(()=>{});
  }, 400);
}
function normalizeState(s){
  s.players = s.players||[]; s.courts = s.courts||[]; s.matches = s.matches||[]; s.undoStack = s.undoStack||[];
  s.players.forEach(p=>{ p.history = p.history||[]; });
  s.courts.forEach(c=>{ if(c.teams && (!c.teams[0] || !c.teams[1])) c.teams = null; });
  return s;
}
function adoptRemote(data){
  if(!data || data.src===clientId) return;
  if((data.rev||0) <= ((state && state.rev)||0)) return;
  adopting = true;
  state = normalizeState(data);
  viewerLastT = data.t||Date.now();
  if(!IS_VIEWER){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }
  render();
  adopting = false;
}
let hostES = null;
function hostSubscribe(){
  if(hostES || !live || !live.on || IS_VIEWER) return;
  try{
    hostES = new EventSource(liveUrl());
    hostES.addEventListener('put', e=>{
      try{ const d = JSON.parse(e.data); if(d.path==='/' && d.data) adoptRemote(d.data); }catch(err){}
    });
  }catch(e){}
}
function hostUnsubscribe(){ if(hostES){ hostES.close(); hostES = null; } }
/* viewer */
let viewerLastT = 0;
function startViewer(db, id){
  IS_VIEWER = true;
  live = { dbUrl: db.replace(/\/$/,''), id: id, on: true };
  state = null;
  document.getElementById('btnNewSession').classList.add('hidden');
  $tabs.classList.add('hidden');
  $app.innerHTML = '<div class="card"><p class="subtle">Connecting to live session…</p></div>';
  const url = liveUrl();
  const apply = data => {
    if(!data){ if(!state) $app.innerHTML='<div class="card"><p class="subtle">Live session ended or not found. Ask the organizer for a fresh link.</p></div>'; return; }
    if(!state){ state = normalizeState(data); viewerLastT = data.t||Date.now(); render(); }
    else adoptRemote(data);
  };
  const poll = ()=>{ fetch(url).then(r=>r.json()).then(apply).catch(()=>{}); };
  let pollT = null;
  try{
    const es = new EventSource(url);
    es.addEventListener('put', e=>{ try{ const d = JSON.parse(e.data); (d.path==='/' ? apply(d.data) : poll()); }catch(err){} });
    es.addEventListener('patch', ()=>poll());
    es.onerror = ()=>{ if(!pollT) pollT = setInterval(poll, 5000); };
  }catch(e){ pollT = setInterval(poll, 5000); }
  poll();
}

    <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:10px 14px">
      <b style="color:var(--accent)">● LIVE</b>
      <span class="subtle">updated ${u.getHours()%12||12}:${String(u.getMinutes()).padStart(2,'0')}</span>
    </div>
    ${state.screen==='summary' ? '<div class="card" style="text-align:center"><h3>🏁 Session wrapped</h3></div>' : ''}
    ${courtsHtml}
    <div class="card"><h3 style="margin-bottom:6px">🏓 Up next</h3>${queueHtml}</div>
    <div class="card"><h3 style="margin-bottom:8px">Standings</h3><table>${standings||''}</table></div>
    <div class="card"><h3 style="margin-bottom:8px">Matches</h3>${matchListHtml()||'<p class="subtle">No matches yet.</p>'}</div>`;
}

/* ---------- session summary ---------- */
function rankedPlayers(){
  return state.players.filter(p=>p.games>0)
    .slice().sort((a,b)=>b.wins-a.wins || a.losses-b.losses || b.games-a.games);
}
function shareText(){
  const d = new Date(state.startedAt||Date.now());
  const rank = rankedPlayers(), medals=['🥇','🥈','🥉'], L=[];
  L.push(`🥒 Pickleball Open Play — ${d.toLocaleDateString(undefined,{month:'short', day:'numeric'})}`);
  L.push(`${rank.length} players · ${state.matches.length} matches`);
  L.push('');
  L.push('Standings:');
  rank.forEach((p,i)=>L.push(`${medals[i]||(i+1)+'.'} ${p.name}${p.late?' ⏰':''} — ${p.wins}W ${p.losses}L`));
  if(rank.some(p=>p.late)) L.push('⏰ joined late');
  L.push('');
  L.push('Matches:');
  state.matches.slice().reverse().forEach(m=>{
    const win=(m.w===0?m.a:m.b).join(' & '), lose=(m.w===0?m.b:m.a).join(' & ');
    const sc=(m.sa!=null&&m.sb!=null)? ` ${m.w===0? m.sa+'–'+m.sb : m.sb+'–'+m.sa}` : '';
    L.push(`• ${win} def. ${lose}${sc}`);
  });
  return L.join('\n');
}
function renderSummary(){
  $tabs.classList.add('hidden');
  document.getElementById('btnNewSession').classList.add('hidden');
  const rank = rankedPlayers(), medals=['🥇','🥈','🥉'];
  const rows = rank.map((p,i)=>`<tr><td style="width:36px; font-size:16px">${medals[i]||(i+1)+'.'}</td><td><b>${esc(p.name)}</b>${p.late?' <span class="tag zz">⏰ late</span>':''}</td><td>${p.wins}–${p.losses}</td><td class="subtle">${p.games} games</td></tr>`).join('');
  const d = new Date(state.startedAt||Date.now());
  const dur = (state.endedAt && state.startedAt) ? Math.max(1, Math.round((state.endedAt-state.startedAt)/60000)) : null;
  const durTxt = dur ? (dur>=60 ? Math.floor(dur/60)+'h '+(dur%60)+'m' : dur+'m') : '';
  const live = state.courts.some(c=>c.teams);
  $app.innerHTML = `
    <div class="card" style="text-align:center">
      <h2>🏁 Session wrapped</h2>
      <p class="subtle" style="margin-top:6px">${d.toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'})} · ${rank.length} players · ${state.matches.length} matches${durTxt? ' · '+durTxt : ''}</p>
      ${live? '<p class="hint">⚠ A match was still in progress — it isn\'t counted. Resume the session to finish it.</p>':''}
    </div>
    <div class="card"><h3 style="margin-bottom:8px">Final standings</h3><table>${rows||''}</table>${rank.some(p=>p.late)?'<p class="hint">⏰ = joined late, so their game count starts from when they arrived.</p>':''}</div>
    <div class="card">
      <h3 style="margin-bottom:10px">Send to the group</h3>
      <div class="row">
        <button class="btn primary grow" data-action="share-summary">📤 Share</button>
        <button class="btn grow" data-action="copy-summary">📋 Copy</button>
      </div>
      <div class="row" style="margin-top:8px">
        <button class="btn grow" data-action="export-txt">📄 Log .txt</button>
        <button class="btn grow" data-action="export-json">💾 Backup .json</button>
      </div>
    </div>
    <div class="card"><h3 style="margin-bottom:8px">All matches</h3>${matchListHtml()||'<p class="subtle">No matches recorded.</p>'}</div>
    <div class="row" style="margin-bottom:20px">
      <button class="btn ghost grow" data-action="resume-session">← Resume session</button>
      <button class="btn grow" data-action="new-session" style="color:var(--danger)">Start fresh</button>
    </div>`;
}

/* ---------- partner modal ---------- */
function openPartnerModal(pid){
  const p = byId(pid); if(!p) return;
  const options = state.players.filter(x=>x.status!=='out' && x.id!==pid);
  $modalHost.innerHTML = `
    <div class="overlay" data-action="modal-bg">
      <div class="modal">
        <h3>🔗 Fixed partner for ${esc(p.name)}</h3>
        <p class="subtle">Partners always land on the same team and go on court together.</p>
        <div style="max-height:50vh; overflow:auto; margin-top:12px">
          ${options.map(x=>`<button class="btn" style="width:100%; margin-bottom:6px; text-align:left; ${x.id===p.partnerId?'border:1px solid var(--accent); color:var(--accent);':''}" data-action="set-partner" data-pid="${pid}" data-mate="${x.id}">${esc(x.name)}${x.id===p.partnerId?' ✓':''}${x.partnerId && x.id!==p.partnerId ? ' <span class="subtle">(🔗 '+esc(nameOf(x.partnerId))+')</span>':''}</button>`).join('')}
        </div>
        <div class="row" style="margin-top:10px">
          ${p.partnerId? `<button class="btn danger grow" data-action="set-partner" data-pid="${pid}" data-mate="">Unlink</button>`:''}
          <button class="btn ghost grow" data-action="modal-close">Cancel</button>
        </div>
      </div>
    </div>`;
}

/* ---------- QR modal ---------- */
function openQrModal(){
  const url = liveLink();
  $modalHost.innerHTML = `
    <div class="overlay" data-action="modal-bg">
      <div class="modal" style="text-align:center">
        <h3>Scan to ${live.mode==='open'?'watch & edit':'watch live'}</h3>
        <p class="subtle" style="margin:6px 0 12px">Point a phone camera here — the live session opens right in their browser.</p>
        <div id="qrBox" style="background:#fff; border-radius:12px; padding:14px; display:inline-flex; align-items:center; justify-content:center; min-width:248px; min-height:248px"><span style="color:#888; font-size:13px">Generating…</span></div>
        <div class="row" style="margin-top:14px">
          <button class="btn grow" data-action="live-copy">📋 Copy link</button>
          <button class="btn ghost grow" data-action="modal-close">Close</button>
        </div>
      </div>
    </div>`;
  const box = document.getElementById('qrBox');
  const make = ()=>{ box.innerHTML=''; new QRCode(box, {text:url, width:220, height:220, correctLevel:QRCode.CorrectLevel.M}); };
  const fallback = ()=>{ box.innerHTML = '<img width="220" height="220" alt="QR code" src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='+encodeURIComponent(url)+'">'; };
  if(window.QRCode){ make(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  s.onload = make; s.onerror = fallback;
  document.head.appendChild(s);
}

/* ---------- finish modal ---------- */
function openFinishModal(courtId){
  const c = state.courts.find(x=>x.id===courtId); if(!c||!c.teams) return;
  const an = c.teams[0].filter(Boolean).map(nameOf).join(' & '), bn = c.teams[1].filter(Boolean).map(nameOf).join(' & ');
  $modalHost.innerHTML = `
    <div class="overlay" data-action="modal-bg">
      <div class="modal">
        <h3>Court ${c.id} — who won?</h3>
        <p class="subtle">Scores are optional.</p>
        <div class="scorerow">
          <input id="sa" type="number" inputmode="numeric" placeholder="—" min="0" style="border-color:rgba(95,212,245,.5)">
          <span class="subtle">to</span>
          <input id="sb" type="number" inputmode="numeric" placeholder="—" min="0" style="border-color:rgba(255,184,92,.5)">
        </div>
        <div class="winbtns">
          <button class="btn wa" data-action="win" data-court="${c.id}" data-w="0">🏆 ${esc(an)}</button>
          <button class="btn wb" data-action="win" data-court="${c.id}" data-w="1">🏆 ${esc(bn)}</button>
        </div>
        <div style="margin-top:12px; text-align:center">
          <button class="btn ghost small" data-action="modal-close">Cancel</button>
        </div>
      </div>
    </div>`;
}
function closeModal(){ $modalHost.innerHTML=''; }

/* ---------- toast ---------- */
let toastTimer=null;
function toast(msg){
  const h = document.getElementById('toastHost');
  h.innerHTML = `<div class="toast">${esc(msg)}</div>`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>h.innerHTML='', 2200);
}

/* ---------- actions ---------- */
function doAction(action, el){
  switch(action){
    case 'setup-add': {
      const inp = document.getElementById('setupName');
      const n = inp.value.trim();
      if(n){ if(ui.setupNames.some(x=>x.toLowerCase()===n.toLowerCase())){ toast('Name already added'); } else ui.setupNames.push(n); }
      renderSetup(); const i2=document.getElementById('setupName'); i2.focus();
      return;
    }
    case 'setup-remove': ui.setupNames.splice(+el.dataset.i,1); renderSetup(); return;
    case 'setup-start': {
      const courts = +(document.getElementById('setupCourts').value)||1;
      if(ui.setupNames.length<4){ toast('Need at least 4 players'); return; }
      state = freshState(ui.setupNames, courts);
      fillCourts(); save(); render(); return;
    }
    case 'tab': ui.tab = el.dataset.tab; ui.selected=null; render(); return;
    case 'shuffle': shuffleTeams(+el.dataset.court); save(); animatedRender(); return;
    case 'start':
      if(startMatch(+el.dataset.court)){ save(); render(); }
      else toast('Fill all 4 slots first');
      return;
    case 'fill-vacant': {
      if(!ui.selected){ toast('Tap a player first, then the open slot'); return; }
      if(placeVacant(ui.selected, +el.dataset.court, +el.dataset.team, +el.dataset.pos)){
        const n = nameOf(ui.selected); ui.selected=null; save(); animatedRender(); toast(`${n} is in`);
      } else { toast("Couldn't place there"); }
      return;
    }
    case 'finish': if(!finishing.has(+el.dataset.court)) openFinishModal(+el.dataset.court); return;
    case 'win': {
      const sa = document.getElementById('sa').value, sb = document.getElementById('sb').value;
      const cid = +el.dataset.court, w = +el.dataset.w;
      const SA = sa===''?null:+sa, SB = sb===''?null:+sb;
      closeModal();
      finishing.add(cid);
      const teamEl = document.querySelector(`.team[data-court="${cid}"][data-team="${w}"]`);
      const go = ()=>{ finishMatch(cid, w, SA, SB); finishing.delete(cid); save(); animatedRender(); };
      if(teamEl){ teamEl.classList.add('winflash'); setTimeout(go, 500); } else go();
      return;
    }
    case 'modal-bg': if(event && event.target===el) closeModal(); return;
    case 'modal-close': closeModal(); return;
    case 'partner': openPartnerModal(el.dataset.pid); return;
    case 'set-partner': {
      const pid = el.dataset.pid, mate = el.dataset.mate;
      if(mate && byId(pid) && byId(pid).partnerId===mate){ setPartner(pid, null); }
      else setPartner(pid, mate || null);
      closeModal(); save(); render(); toast('Partners updated'); return;
    }
    case 'break': {
      if(!toggleBreak(el.dataset.pid)) toast('Sub them out of the court first');
      save(); animatedRender(); return;
    }
    case 'remove': {
      const p = byId(el.dataset.pid);
      if(p && confirm(`Remove ${p.name} from the session?`)){ removePlayer(p.id); save(); render(); }
      return;
    }
    case 'add-player': {
      const inp = document.getElementById('addName'); const n = inp.value.trim();
      if(!n) return;
      if(state.players.some(x=>x.status!=='out' && x.name.toLowerCase()===n.toLowerCase())){ toast('Name already in session'); return; }
      addPlayer(n); save(); animatedRender(); toast(`${n} added to the queue`); return;
    }
    case 'set-courts': setCourtCount(+(document.getElementById('courtCount').value)); save(); animatedRender(); return;
    case 'undo': if(undo()){ save(); animatedRender(); toast('Last result undone'); } return;
    case 'export-json':
      download('salitan-session-'+stamp()+'.json', JSON.stringify({...state, undoStack:[]}, null, 1), 'application/json');
      toast('Backup downloaded'); return;
    case 'export-txt':
      download('salitan-log-'+stamp()+'.txt', sessionAsText());
      toast('Log downloaded'); return;
    case 'restore': {
      const fi = document.getElementById('restoreFile');
      fi.onchange = () => {
        const f = fi.files[0]; if(!f) return;
        const r = new FileReader();
        r.onload = () => {
          try{
            const s = JSON.parse(r.result);
            if(!s || !Array.isArray(s.players) || !Array.isArray(s.courts)) throw 0;
            s.undoStack = s.undoStack||[];
            state = s; save(); render(); toast('Session restored');
          }catch(e){ toast('Not a valid backup file'); }
        };
        r.readAsText(f);
      };
      fi.click(); return;
    }
    case 'live-setup': {
      const u = (document.getElementById('dbUrl').value||'').trim().replace(/\/$/,'');
      if(!/^https:\/\/[^\s\/]+\.(firebaseio\.com|firebasedatabase\.app)$/.test(u)){ toast("That doesn't look like a Realtime Database URL"); return; }
      live = { dbUrl:u, id:null, on:false }; liveSave(); doAction('live-start'); return;
    }
    case 'live-start':
      if(!live || !live.dbUrl) return;
      if(!live.id) live.id = Math.random().toString(36).slice(2,10);
      if(!live.mode) live.mode = 'locked';
      live.on = true; liveSave(); pushLive(); hostSubscribe(); render(); toast('You are live — share the link'); return;
    case 'live-stop':
      hostUnsubscribe();
      if(live){ fetch(liveUrl(), {method:'DELETE'}).catch(()=>{}); live.on = false; live.id = null; liveSave(); }
      render(); toast('Live sharing stopped'); return;
    case 'live-mode':
      live.mode = el.dataset.mode; liveSave(); pushLive(); render();
      toast(live.mode==='open' ? 'Anyone with the link can now edit' : 'Link is now view-only'); return;
    case 'live-qr': openQrModal(); return;
    case 'live-share': {
      const url = liveLink();
      if(navigator.share){ navigator.share({title:'Salitan — live', url}).catch(()=>{}); }
      else if(navigator.clipboard){ navigator.clipboard.writeText(url).then(()=>toast('Link copied')); }
      return;
    }
    case 'live-copy':
      if(navigator.clipboard){ navigator.clipboard.writeText(liveLink()).then(()=>toast('Link copied')); }
      return;
    case 'finish-session': state.endedAt=Date.now(); state.screen='summary'; save(); render(); return;
    case 'resume-session': state.screen='main'; save(); render(); return;
    case 'share-summary': {
      const txt = shareText();
      if(navigator.share){ navigator.share({title:'Pickleball Open Play', text:txt}).catch(()=>{}); }
      else if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(()=>toast('Copied — paste it to the group chat')); }
      return;
    }
    case 'copy-summary':
      if(navigator.clipboard){ navigator.clipboard.writeText(shareText()).then(()=>toast('Summary copied')); }
      return;
    case 'new-session': {
      if(confirm('Start a fresh session? Current players, queue and match log will be cleared.')){
        localStorage.removeItem(LS_KEY); state=null; ui.setupNames=[]; ui.selected=null; ui.tab='play'; render();
      } return;
    }
  }
}

document.addEventListener('click', e=>{
  const el = e.target.closest('[data-action]');
  if(el){ doAction(el.dataset.action, el); return; }
});

/* ---------- tap-to-swap + drag ---------- */
function trySwap(aId, bId){
  const A=byId(aId), B=byId(bId);
  if(!A || !B) return;
  if(!findSlot(aId) && !findSlot(bId)){
    if(A.status==='queued' && B.status==='queued' && reorderQueue(aId, bId)){
      ui.selected=null; save(); animatedRender();
      toast(`${A.name} is now #${prioritySort(queuedPlayers()).findIndex(p=>p.id===aId)+1} in queue`);
    } else { toast("Can't move that player"); ui.selected=null; render(); }
    return;
  }
  if(swapPlayers(aId,bId)){ ui.selected=null; save(); animatedRender(); toast(`Swapped ${A.name} ↔ ${B.name}`); }
  else { toast('Pick one player on a court'); ui.selected=null; render(); }
}
let drag=null;
document.addEventListener('pointerdown', e=>{
  const chip = e.target.closest('[data-chip]');
  if(!chip) return;
  e.preventDefault();
  drag = { pid:chip.dataset.chip, x:e.clientX, y:e.clientY, el:chip, moved:false, ghost:null };
});
function dropTarget(x, y, pid){
  const under = document.elementFromPoint(x, y);
  if(!under) return null;
  const nearestChip = root => {
    const chips = [...root.querySelectorAll('[data-chip]')].filter(c=>c.dataset.chip!==pid);
    let best=null, bd=Infinity;
    for(const c of chips){
      const r=c.getBoundingClientRect();
      const d=Math.hypot(x-(r.left+r.width/2), y-(r.top+r.height/2));
      if(d<bd){ bd=d; best=c; }
    }
    return best;
  };
  const vac = under.closest('[data-vacant]');
  if(vac) return {type:'vacant', el:vac};
  const chip = under.closest('[data-chip]');
  if(chip) return chip.dataset.chip!==pid ? {type:'chip', el:chip} : null;
  const row = under.closest('.qitem');
  if(row){
    const c = row.querySelector('[data-chip]');
    return (c && c.dataset.chip!==pid) ? {type:'chip', el:c} : null;
  }
  const team = under.closest('.team');
  if(team){
    const slot = findSlot(pid);
    if(slot && team.dataset.court && slot.court.id===+team.dataset.court && slot.ti===+team.dataset.team) return null; // own team
    const v = team.querySelector('[data-vacant]');
    if(v) return {type:'vacant', el:v};
    const best = nearestChip(team);
    return best ? {type:'chip', el:best} : null;
  }
  const court = under.closest('.court');
  if(court){
    const slot = findSlot(pid);
    if(slot && court.querySelector(`[data-chip="${pid}"]`)) return null; // own court, ambiguous
    const v = court.querySelector('[data-vacant]');
    if(v) return {type:'vacant', el:v};
    const best = nearestChip(court);
    return best ? {type:'chip', el:best} : null;
  }
  const qc = under.closest('#queueCard');
  if(qc && findSlot(pid)) return {type:'queue', el:qc}; // court player -> bench (next up subs in)
  return null;
}
function clearDropHints(){
  document.querySelectorAll('.drophint').forEach(x=>x.classList.remove('drophint'));
  document.querySelectorAll('.dropzone').forEach(x=>x.classList.remove('dropzone'));
}
document.addEventListener('pointermove', e=>{
  if(!drag) return;
  if(!drag.moved && Math.hypot(e.clientX-drag.x, e.clientY-drag.y)>12){
    drag.moved=true;
    const g = drag.el.cloneNode(true);
    g.classList.add('dragghost'); document.body.appendChild(g); drag.ghost=g;
  }
  if(drag.moved){
    e.preventDefault();
    drag.ghost.style.left=(e.clientX-65)+'px'; drag.ghost.style.top=(e.clientY-30)+'px';
    clearDropHints();
    const t = dropTarget(e.clientX, e.clientY, drag.pid);
    if(t) t.el.classList.add(t.type==='chip' ? 'drophint' : 'dropzone');
  }
},{passive:false});
document.addEventListener('pointerup', e=>{
  if(!drag) return;
  const d=drag; drag=null;
  if(d.ghost) d.ghost.remove();
  clearDropHints();
  if(d.moved){
    const t = dropTarget(e.clientX, e.clientY, d.pid);
    if(t){
      if(t.type==='chip'){ trySwap(d.pid, t.el.dataset.chip); }
      else if(t.type==='vacant'){
        if(placeVacant(d.pid, +t.el.dataset.court, +t.el.dataset.team, +t.el.dataset.pos)){ ui.selected=null; save(); animatedRender(); toast(`${nameOf(d.pid)} is in`); }
      }
      else if(removeFromCourt(d.pid)){ save(); animatedRender(); toast(`${nameOf(d.pid)} back in queue — slot left open`); }
    }
  } else {
    // tap: select / swap
    const pid = d.pid;
    if(ui.selected && ui.selected!==pid){ trySwap(ui.selected, pid); }
    else if(ui.selected===pid){ ui.selected=null; render(); }
    else { ui.selected=pid; render(); toast(`${nameOf(pid)} selected — tap someone to swap`); }
  }
});

/* ---------- timers ---------- */
setInterval(()=>{
  document.querySelectorAll('.timer[data-start]').forEach(t=>{
    const s = Math.max(0, Math.floor((Date.now()-(+t.dataset.start))/1000));
    t.textContent = Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  });
}, 1000);

/* ---------- boot ---------- */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js');
}
const vh = new URLSearchParams(location.hash.slice(1));
if(vh.get('live') && vh.get('db')){
  startViewer(vh.get('db'), vh.get('live'));
} else {
  load();
  if(!state){ state={screen:'setup'}; }
  if(live && live.on && state.screen!=='setup'){ hostSubscribe(); }
  render();
}
</script>
